name: Build VST3

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Download JUCE 8.0.12
        run: |
          curl -L -o juce.tar.gz https://github.com/juce-framework/JUCE/archive/refs/tags/8.0.12.tar.gz
          tar -xzf juce.tar.gz
          echo "JUCE_DIR=${{ github.workspace }}\JUCE-8.0.12" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: cmake -B Build -G "Visual Studio 17 2022" -A x64 -DJUCE_DIR="$env:JUCE_DIR"

      - name: Build
        run: cmake --build Build --config Release --verbose

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: WavetableSynth-vst3
          path: Build/WavetableSynth_artefacts/Release/VST3/WavetableSynth.vst3
